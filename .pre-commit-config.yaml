# Pre-commit hooks: keep code, types, and commit messages clean before they hit the repo.
# Install once with: pre-commit install --install-hooks --hook-type commit-msg
# Run on demand with: pre-commit run --all-files

default_language_version:
  python: python3.12

repos:
  # --- Generic hygiene -----------------------------------------------------
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=1024]
      - id: mixed-line-ending
        args: [--fix=lf]

  # --- Python lint + format (Ruff) ----------------------------------------
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff-check
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  # --- Static type checking (mypy) ---------------------------------------
  # Run via project venv so plugins / type-stubs match pyproject.toml exactly.
  - repo: local
    hooks:
      - id: mypy
        name: mypy (project venv)
        entry: uv run --frozen mypy
        language: system
        types_or: [python, pyi]
        require_serial: true
        pass_filenames: false
        args: [src, tests]

  # --- Conventional commit message enforcement ---------------------------
  - repo: https://github.com/commitizen-tools/commitizen
    rev: v4.10.0
    hooks:
      - id: commitizen
        stages: [commit-msg]
